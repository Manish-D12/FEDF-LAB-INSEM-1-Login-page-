<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f2f5;
    }
    .login-box {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 360px;
    }
    .login-box h2 {
      text-align: center;
      margin-bottom: 24px;
      color: #1a1a1a;
    }
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #555;
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .field input:focus {
      border-color: #2e7d32;
    }
    .login-btn {
      width: 100%;
      padding: 11px;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .login-btn:hover { background: #256528; }
    .login-box .footer {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #777;
    }
    .login-box .footer a { color: #2e7d32; text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Sign In</h2>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="login-btn" onclick="handleLogin()">Sign In</button>
    <div class="footer">
      Don't have an account? <a href="#">Sign up</a>
    </div>
  </div>

  <script>
    function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (!email || !password) {
        alert('Please fill in all fields');
        return;
      }
      alert('Login attempted with: ' + email);
      // add your auth logic here
    }
  </script>
</body>
</html>
